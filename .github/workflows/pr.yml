name: pr

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - dev

permissions:
  actions: write
  contents: read
  id-token: write
  pull-requests: write

env:
  ENV: dev
  AWS_DEFAULT_REGION: us-east-1

jobs:

  call-test:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/_test.yml

  cdk-diff:
    # environment: dev
    needs: [call-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6.2.0
        with:
          node-version: '^22.11.0'

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "^3.12.0"

      - uses: actions/checkout@v6.0.2

      - name: Install CDK
        run: |
          cd iac && ./install_cdk.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          DEPLOY_AWS_ROLE: ${{ secrets.DEPLOY_AWS_ROLE }}
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CDK_DEFAULT_ACCOUNT }}:role/${{ secrets.DEPLOY_AWS_ROLE }}
          aws-region: us-east-1
          role-skip-session-tagging: true

      - name: CDK Nag
        id: cdk-nag
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -o pipefail
          cd iac && cdk synth --quiet 2>&1 | tee /tmp/cdk-nag.log
          if grep -q '^\[Error' /tmp/cdk-nag.log; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post CDK Nag results to PR
        if: always() && steps.cdk-nag.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/cdk-nag.log', 'utf8');
            const errors = log.split('\n').filter(l => l.startsWith('[Error'));
            const warnings = log.split('\n').filter(l => l.startsWith('[Warning'));
            let body = '## cdk-nag report\n\n';
            if (errors.length === 0) {
              body += ':white_check_mark: **No unsuppressed errors.**\n';
            } else {
              body += `:x: **${errors.length} unsuppressed error(s):**\n\n`;
              body += '```\n' + errors.join('\n') + '\n```\n';
            }
            if (warnings.length > 0) {
              body += `\n:warning: ${warnings.length} warning(s)\n`;
            }
            body += '\n---\n*See `iac/nag_suppressions.py` to add suppressions for accepted risks.*';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## cdk-nag report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on CDK Nag errors
        if: steps.cdk-nag.outputs.has_errors == 'true'
        run: |
          echo "::error::cdk-nag found unsuppressed errors — see PR comment for details"
          exit 1

      - name: CDK Diff
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          SYS_EMAIL: ${{ secrets.SYS_EMAIL }}
        run: |
          cd iac && ./cdk_diff.sh
