name: pr

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - dev

permissions:
  contents: read

env:
  ENV: dev
  AWS_DEFAULT_REGION: us-east-1

jobs:

  # Lint Python. Tool versions pinned to match .pre-commit-config.yaml.
  lint:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: isort
        uses: isort/isort-action@24d8a7a51d33ca7f36c3f23598dafa33f7071326  # v1.1.1
        with:
          isort-version: "5.12.0"

      - name: ruff check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          version: "0.1.6"
          args: "check"

      - name: ruff format
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          version: "0.1.6"
          args: "format --check"

  # Tests run before deploys (see deploy-cdk.yml), not on every PR. PRs only
  # surface the cdk diff + nag report.
  cdk-diff:
    if: github.event.pull_request.draft == false
    permissions:
      actions: write
      contents: read
      id-token: write
      pull-requests: write
    # No environment here on purpose: GitHub treats `environment:` as a deploy
    # gate, and dev's protection rules block PR merge refs. cdk-diff is a
    # read-only diff, so it runs un-gated. SLACK_* are repo-level secrets (dev
    # values) so the diff is accurate; the per-env deploy jobs override them
    # with environment secrets.
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '^22.11.0'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "^3.12.0"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install CDK
        run: |
          cd iac && ./install_cdk.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          DEPLOY_AWS_ROLE: ${{ secrets.DEPLOY_AWS_ROLE }}
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CDK_DEFAULT_ACCOUNT }}:role/${{ secrets.DEPLOY_AWS_ROLE }}
          aws-region: us-east-1
          role-skip-session-tagging: true

      - name: CDK Nag
        id: cdk-nag
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          PYTHONPATH: ${{ github.workspace }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WORKSPACE_ID: ${{ secrets.SLACK_WORKSPACE_ID }}
        run: |
          set -o pipefail
          cd iac && cdk synth --quiet 2>&1 | tee /tmp/cdk-nag.log
          if grep -q '^\[Error' /tmp/cdk-nag.log; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post CDK Nag results to PR
        if: always() && steps.cdk-nag.outcome == 'success'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/cdk-nag.log', 'utf8');
            const errors = log.split('\n').filter(l => l.startsWith('[Error'));
            const warnings = log.split('\n').filter(l => l.startsWith('[Warning'));
            let body = '## cdk-nag report\n\n';
            if (errors.length === 0) {
              body += ':white_check_mark: **No unsuppressed errors.**\n';
            } else {
              body += `:x: **${errors.length} unsuppressed error(s):**\n\n`;
              body += '```\n' + errors.join('\n') + '\n```\n';
            }
            if (warnings.length > 0) {
              body += `\n:warning: ${warnings.length} warning(s)\n`;
            }
            body += '\n---\n*See `iac/nag_suppressions.py` to add suppressions for accepted risks.*';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## cdk-nag report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on CDK Nag errors
        if: steps.cdk-nag.outputs.has_errors == 'true'
        run: |
          echo "::error::cdk-nag found unsuppressed errors — see PR comment for details"
          exit 1

      - name: CDK Diff
        id: cdk-diff
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          PYTHONPATH: ${{ github.workspace }}
          SYS_EMAIL: ${{ secrets.SYS_EMAIL }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WORKSPACE_ID: ${{ secrets.SLACK_WORKSPACE_ID }}
        run: |
          cd iac && ./cdk_diff.sh

      - name: Post CDK Diff results to PR
        if: always() && steps.cdk-diff.outcome != 'skipped'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          CDK_DIFF_OUTCOME: ${{ steps.cdk-diff.outcome }}
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/cdk-diff.log', 'utf8');
            const status = process.env.CDK_DIFF_OUTCOME === 'success' ? 'Success' : 'Failed';
            const icon = status === 'Success' ? ':white_check_mark:' : ':x:';
            const body = [
              `#### \`cdk diff\` ${icon} ${status}`,
              '<details><summary>Show Output</summary>',
              '',
              '```',
              log,
              '```',
              '',
              '</details>',
              '',
              `*Workflow: \`${context.workflow}\`*`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('#### `cdk diff`'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
