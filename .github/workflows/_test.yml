name: 🧪 Test

on: workflow_call

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: mermaid
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      sqs:
        image: softwaremill/elasticmq-native
        ports:
          - 9324:9324

    env:
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      ENV: local
      DB_NAME: mermaid
      DB_USER: postgres
      DB_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
      DB_HOST: localhost
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: app.settings
      DRF_RECAPTCHA_TESTING: "True"
      MERMAID_API_SIGNING_SECRET: ${{ secrets.TEST_MERMAID_API_SIGNING_SECRET}}
      MERMAID_API_AUDIENCE: https://ci-test-api.datamermaid.org
      AUTH0_MANAGEMENT_API_AUDIENCE: https://ci-test-management.datamermaid.org
      AUTH0_DOMAIN: ci-test.auth0.com
      DEFAULT_DOMAIN_API: localhost:8080
      DEFAULT_DOMAIN_COLLECT: localhost:8888
      SQS_ENDPOINT_URL: http://localhost:9324
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Wait for SQS service
        run: |
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/9324' 2>/dev/null; then
              echo "SQS is ready"
              exit 0
            fi
            echo "Waiting for SQS... ($i)"
            sleep 1
          done
          echo "SQS did not become ready"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            gdal-bin \
            python3-gdal

      - name: Cache pip packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: src
        run: pytest --no-migrations --cov --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: src/coverage.xml
